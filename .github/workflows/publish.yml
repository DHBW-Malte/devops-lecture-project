name: Publish Docker Images

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # Publish is triggered by push on a release tag like auth-service-1.0.1

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Here we use the service version output from the release please workflow
      - name: Get service name and version
        id: service
        run: |
          echo "service=$(echo ${{ github.ref }} | cut -d '/' -f 3 | cut -d '-' -f 1-2)" >> $GITHUB_OUTPUT
          echo "version=$(echo ${{ github.ref }} | cut -d '/' -f 3 | cut -d '-' -f 3)" >> $GITHUB_OUTPUT

      - name: Lg in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: service=${{ steps.service.outputs.service }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.service.outputs.service }}:${{ steps.service.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.service.outputs.service }}:latest
