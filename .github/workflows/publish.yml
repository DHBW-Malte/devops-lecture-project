name: Publish Docker Images
on:
  push:
    tags:
      - "*-[0-9]+.[0-9]+.[0-9]+"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions: 
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Get service name and version
        id: service
        run: |
          echo "service=$(echo ${{ github.ref }} | cut -d '/' -f 3 | cut -d '-' -f 1-2)" >> $GITHUB_OUTPUT
          echo "version=$(echo ${{ github.ref }} | cut -d '/' -f 3 | cut -d '-' -f 3)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build only, load into local Docker daemon, do NOT push yet
      - name: Build Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          build-args: service=${{ steps.service.outputs.service }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.service.outputs.service }}:${{ steps.service.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.service.outputs.service }}:latest

      # Generate SBOM from the locally built image
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.service.outputs.service }}:${{ steps.service.outputs.version }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          artifact-name: sbom-${{ steps.service.outputs.service }}-${{ steps.service.outputs.version }}.json

      # Scan the SBOM for CVEs — fails the pipeline on critical findings
      - name: Scan SBOM for vulnerabilities
        uses: anchore/scan-action@v6
        with:
          sbom: sbom.cyclonedx.json
          fail-build: true
          severity-cutoff: critical

      # Only reached if the scan passed, so we only publish images without severe vulnerabilities
      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.service.outputs.service }}:${{ steps.service.outputs.version }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.service.outputs.service }}:latest     - name: 
