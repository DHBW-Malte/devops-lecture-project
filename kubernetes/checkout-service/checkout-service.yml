apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-service-deploy
  labels:
    app: checkout-service
spec: 
  replicas: 8
  selector:
    matchLabels:
      app: checkout-service
  template: 
    metadata:
      labels:
        app: checkout-service
    spec:
      containers:
      - name: checkout-service
        image: dhbwmalte/checkout-service:0.3.1
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-service
spec:
  selector:
    app: checkout-service
  ports:
  - port: 8080
    targetPort: 8080
