apiVersion: apps/v1
kind: Deployment
metadata:
  name: products-service-deploy
  labels:
    app: products-service
spec: 
  replicas: 6
  selector:
    matchLabels:
      app: products-service
  template: 
    metadata:
      labels:
        app: products-service
    spec:
      containers:
      - name: products-service
        image: dhbwmalte/products-service:0.2.1
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: products-service
spec:
  selector:
    app: products-service
  ports:
  - port: 8080
    targetPort: 8080
