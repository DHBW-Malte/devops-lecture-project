apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth-service
spec:
  destination:
    namespace: webshop
    server: https://kubernetes.default.svc
  source:
    path: kubernetes/auth-service
    repoURL: https://github.com/DHBW-Malte/devops-lecture-project.git
    targetRevision: HEAD
  sources: []
  project: default
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
      enabled: true
    syncOptions:
      - CreateNamespace=true

