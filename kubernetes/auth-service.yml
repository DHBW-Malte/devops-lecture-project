apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-deploy
  labels:
    app: auth-service
spec: 
  replicas: 4
  selector:
    matchLabels:
      app: auth-service
  template: 
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: dhbwmalte/auth-service:0.3.1
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
  - port: 8080
    targetPort: 8080
